      revision: d6e05a16d463e07921a833a9dccd2bb8a44ec22e
    - name: zmk
      remote: zmkfirmware
      # Pinned release the module revision above was developed against.
      revision: v0.3.0
      import: app/west.yml
  self:
    path: config
